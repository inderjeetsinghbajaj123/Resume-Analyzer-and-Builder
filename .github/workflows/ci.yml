name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node & Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci # 'npm ci' is faster and cleaner for automated environments

      - name: Build Frontend
        run: npm run build

  backend-check:
    name: Backend Validation Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node & Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Dry-Run Server (Smoke Test)
        env:
          # Provide dummy variables so the backend doesn't crash on initialization due to missing .env values
          MONGO_URI: "mongodb://localhost:27017/test"
          GEMINI_API_KEY: "dummy_key_for_ci"
          JWT_SECRET: "dummy_secret"
        # This starts the server in the background, waits 5 seconds to see if it crashes, then shuts it down safely.
        run: |
          npm start &
          PID=$!
          sleep 5
          kill $PID