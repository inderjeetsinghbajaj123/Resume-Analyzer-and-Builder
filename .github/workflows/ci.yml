name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '${{ github.workspace }}/Frontend/package-lock.json'
      - run: npm ci
      - run: npm run build

  backend-check:
    name: Backend Validation Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '${{ github.workspace }}/Backend/package-lock.json'
      - run: npm ci
      # Verifies the backend boots up without throwing an immediate crash/error
      - name: Smoke Test Server
        env:
          MONGO_URI: "mongodb://localhost:27017/test"
          GEMINI_API_KEY: "dummy_key"
          JWT_SECRET: "dummy_secret"
        run: |
          node index.js &
          PID=$!
          sleep 5
          kill $PID