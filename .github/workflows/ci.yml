name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node & Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '${{ github.workspace }}/Frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

  backend-check:
    name: Backend Validation Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node & Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '${{ github.workspace }}/Backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Smoke Test Server
        run: |
          MONGO_URI="mongodb://127.0.0.1:27017/test" GEMINI_API_KEY="dummy_key" JWT_SECRET="dummy_secret" NODE_ENV="ci" node index.js &
          PID=$!
          sleep 5
          kill $PID